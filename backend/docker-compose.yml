services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mektep
      POSTGRES_USER: mektep
      POSTGRES_PASSWORD: mektep_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://mektep:mektep_dev@postgres:5432/mektep?sslmode=disable"
      JWT_SECRET: "dev-secret-change-in-production"
      ADMIN_API_KEY: "dev-admin-key-change-in-production"
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
