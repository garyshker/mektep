<!doctype html>
<html lang="kk">
<head>
<meta charset="utf-8" />
<title>Мектеп — Redesigned</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0E8C6B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #E6F3EC;
    --bg-2: #F2FAF5;
    --ink: #0F2A22;
    --ink-soft: #4A6A60;
    --ink-mute: #8AA39A;
    --line: rgba(15, 42, 34, 0.08);
    --card: #FFFFFF;
    --card-soft: #F5FBF7;
    --brand: #0E8C6B;
    --brand-deep: #0a6e54;
    --brand-tint: #C6EAD8;
    --shadow: 0 1px 0 rgba(15,42,34,.04), 0 10px 28px rgba(15,80,60,.07);
    --shadow-lg: 0 2px 0 rgba(15,42,34,.04), 0 22px 50px rgba(15,80,60,.12);
    --radius: 22px;
    --radius-sm: 14px;
    /* subject palettes */
    --math-bg: #FFE9C8; --math-ic: #E88912;
    --kaz-bg: #FFD8E1;  --kaz-ic: #E14B73;
    --world-bg: #CDEBD3; --world-ic: #2D9D5C;
    --eng-bg: #DEE3FB;   --eng-ic: #5764D8;
  }
  *{box-sizing:border-box}
  html{overflow-x:hidden; max-width:100%}
  html,body{margin:0;padding:0}
  body{
    font-family:'Nunito', system-ui, -apple-system, 'Segoe UI', sans-serif;
    background:
      radial-gradient(1200px 600px at 85% -10%, #D5EFE0 0%, transparent 60%),
      radial-gradient(900px 600px at -10% 100%, #DAEFEA 0%, transparent 60%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
    width:100%;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  button{font-family:inherit;color:inherit;cursor:pointer;border:0;background:none;padding:0}
  #app{min-height:100vh}

  /* ----- view switcher pill ----- */
  .compare {
    position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
    z-index: 40;
    display:flex; align-items:center; gap:6px;
    background: rgba(15, 42, 34, 0.85); color:#fff;
    padding:6px; border-radius: 999px;
    backdrop-filter: blur(8px);
    box-shadow: 0 12px 30px rgba(0,0,0,.18);
    font-weight:700; font-size:13px;
  }
  .compare button{
    color:rgba(255,255,255,.75); padding: 8px 16px; border-radius:999px;
    transition: all .18s;
  }
  .compare button.on { background: #fff; color: var(--brand-deep); }
  .compare button:hover:not(.on){ color:#fff }

  /* ============ ORIGINAL VIEW (recreated for comparison) ============ */
  .orig {
    max-width: 1100px; margin: 0 auto; padding: 28px 32px 80px;
  }
  .orig-shell{
    background:#D6F2E5; border-radius: 28px; padding: 22px 28px 36px;
    min-height: 880px;
  }
  .orig-top{ display:flex; align-items:center; justify-content:space-between; }
  .orig-logo{ display:flex; gap:10px; align-items:center; font-weight:800; font-size:20px;}
  .orig-logo .ic{ width:40px;height:40px;border-radius:12px;background:#11A07A;display:grid;place-items:center;color:#fff;font-size:18px}
  .orig-pill{display:flex;align-items:center;gap:8px;background:#fff;padding:10px 16px;border-radius:999px;font-weight:700;font-size:14px}
  .orig-lang{display:flex;background:#fff;border-radius:999px;padding:4px;font-weight:700;font-size:14px}
  .orig-lang span{padding:8px 14px;border-radius:999px;color:#3a5a51;display:flex;gap:6px;align-items:center}
  .orig-lang span.on{background:#11A07A;color:#fff}
  .orig h1{font-size: 56px; font-weight: 900; line-height:1.05; margin: 40px 0 24px; letter-spacing:-.02em}
  .orig .eyebrow{font-size:13px;letter-spacing:.18em;font-weight:800;color:#0E8C6B;margin-top:30px}
  .orig-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:8px}
  .orig-card{background:#fff;border-radius:22px;padding:24px;min-height:170px;display:flex;flex-direction:column;justify-content:space-between}
  .orig-card.soon{background:#E2F3EA}
  .orig-card .ico{width:54px;height:54px;border-radius:14px;display:grid;place-items:center;font-size:24px}
  .orig-card h3{margin:0;font-weight:800;font-size:22px}
  .orig-card p{margin:4px 0 0;color:#7C9389;font-weight:600;font-size:14px}
  .orig-card .bar{height:4px;width:54px;border-radius:99px;margin-top:14px}
  .orig-soon-pill{position:absolute;top:18px;right:18px;background:#D5E7DC;color:#688679;font-size:11px;font-weight:800;letter-spacing:.1em;padding:5px 10px;border-radius:99px}
  .orig-card{position:relative}

  /* ============ IMPROVED VIEW ============ */
  .v2 {
    max-width: 1280px; margin: 0 auto; padding: 28px 36px 80px;
  }
  /* top bar */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 28px;
  }
  .brand{
    display:flex; align-items:center; gap:12px;
  }
  .brand-mark{
    width:46px; height:46px; border-radius: 14px;
    background: linear-gradient(155deg, #18B187 0%, #0E8C6B 60%, #0A6F55 100%);
    box-shadow: 0 8px 18px rgba(14,140,107,.32), inset 0 1px 0 rgba(255,255,255,.4);
    display:grid; place-items:center; position:relative; overflow:hidden;
  }
  .brand-mark svg{width:24px;height:24px}
  .brand-name{font-weight:900; font-size: 22px; letter-spacing:-.01em}
  .brand-sub{font-size: 11px; color: var(--ink-mute); font-weight:700; letter-spacing:.14em; text-transform:uppercase; margin-top: -2px}

  .topbar-right{display:flex; align-items:center; gap: 10px;}

  .chip{
    display:flex; align-items:center; gap:8px;
    background:#fff; padding: 9px 14px; border-radius: 999px;
    font-weight:800; font-size: 14px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
  }
  .chip.streak{ color:#C9420B }
  .chip.streak .flame{
    width:22px;height:22px;display:grid;place-items:center;
    background: linear-gradient(180deg,#FFB347,#FF6B2B);
    border-radius: 8px; color:#fff; font-size:12px;
    box-shadow: 0 2px 0 rgba(180,60,0,.25);
  }
  .chip.xp{ padding-right: 6px; }
  .xp-ring{
    --pct: 62;
    width: 30px; height: 30px; border-radius: 50%;
    background: conic-gradient(var(--brand) calc(var(--pct) * 1%), #E8F0EC 0);
    display:grid; place-items:center; position:relative;
  }
  .xp-ring::before{content:"";position:absolute;inset:3px;background:#fff;border-radius:50%}
  .xp-ring span{position:relative;font-size:10px;font-weight:900;color:var(--brand-deep)}

  .lang-chip{
    display:flex; align-items:center; gap:8px;
    background:#fff; padding: 9px 8px 9px 14px; border-radius: 999px;
    font-weight:800; font-size: 14px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
    position:relative;
  }
  .lang-flag{
    font-size:20px;line-height:1;
    display:inline-flex;align-items:center;
  }
  .lang-chip .caret{font-size:10px;color:var(--ink-mute);margin: 0 4px}

  .avatar{
    width: 46px; height:46px; border-radius:14px; background: linear-gradient(145deg,#FFE1B0,#FFC68A);
    display:grid; place-items:center; font-weight:900; color:#7E4310; font-size: 17px;
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    position:relative;
  }
  .avatar::after{
    content:""; position:absolute; right:-2px; bottom:-2px;
    width:14px;height:14px;border-radius:50%; background:#3FCB80; border:2px solid #fff;
  }

  /* hero row: continue card + daily quests */
  .hero{
    display:grid;
    grid-template-columns: 1.55fr 1fr;
    gap: 18px;
    margin-bottom: 28px;
  }
  .continue{
    position:relative; overflow:hidden;
    background:
      radial-gradient(600px 280px at 90% 110%, rgba(255,180,71,.18), transparent 60%),
      linear-gradient(135deg, #0E8C6B 0%, #0a6e54 100%);
    color:#fff; border-radius: 26px; padding: 28px 30px;
    box-shadow: var(--shadow-lg);
    display:flex; flex-direction:column; justify-content:space-between;
    min-height: 220px;
  }
  .continue::before{
    content:""; position:absolute; right:-40px; top:-40px; width:240px;height:240px;
    background: radial-gradient(circle, rgba(255,255,255,.10), transparent 65%);
    border-radius:50%;
  }
  .continue-eyebrow{font-size:11px; letter-spacing:.2em; font-weight:800; opacity:.7; text-transform:uppercase}
  .continue h2{
    margin: 8px 0 4px; font-size: 32px; font-weight: 900; letter-spacing:-.02em; line-height:1.1;
  }
  .continue .sub{ opacity:.85; font-weight:600; font-size:15px }
  .continue-row{display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-top: 22px; position:relative; z-index:1}
  .continue-meta{flex:1; min-width:0}
  .continue-bar{
    height: 10px; background: rgba(255,255,255,.18); border-radius:99px; margin-top: 12px; overflow:hidden;
  }
  .continue-bar > div{height:100%; width: 58%; background: linear-gradient(90deg,#FFB75E,#FFCE6F); border-radius:99px}
  .continue-bar-text{display:flex;justify-content:space-between;font-size:12px;font-weight:700;opacity:.85;margin-top:8px}
  .play-btn{
    display:flex; align-items:center; gap:10px;
    background:#fff; color: var(--brand-deep); border-radius: 999px;
    padding: 14px 22px 14px 18px; font-weight:900; font-size:15px;
    box-shadow: 0 8px 22px rgba(0,0,0,.18);
    transition: transform .15s;
  }
  .play-btn:hover{ transform: translateY(-1px) }
  .play-btn .ic{
    width: 24px; height:24px; border-radius:50%; background: var(--brand);
    color:#fff; display:grid; place-items:center; font-size:12px;
  }

  /* daily quests */
  .quests{
    background: #fff; border-radius: 26px; padding: 22px 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
    display:flex; flex-direction:column;
  }
  .quests-head{display:flex; align-items:center; justify-content:space-between; margin-bottom: 12px}
  .quests h3{margin:0; font-size: 16px; font-weight:900; letter-spacing:-.01em}
  .quests-pill{
    font-size:11px; font-weight:800; color: var(--brand-deep);
    background: var(--brand-tint); padding: 4px 9px; border-radius:99px;
    letter-spacing:.04em;
  }
  .quest{
    display:flex; align-items:center; gap: 12px;
    padding: 10px 0;
  }
  .quest + .quest{ border-top: 1px dashed var(--line) }
  .quest-check{
    width: 28px;height:28px; border-radius:9px;
    border: 2px solid var(--line); flex:none;
    display:grid; place-items:center; color: transparent;
    transition: all .15s;
  }
  .quest.done .quest-check{
    background: var(--brand); border-color: var(--brand); color:#fff;
  }
  .quest-body{flex:1; min-width:0}
  .quest-title{font-weight:800; font-size:14.5px; line-height:1.2}
  .quest.done .quest-title{ text-decoration: line-through; color: var(--ink-mute) }
  .quest-meta{font-size:12px; font-weight:700; color: var(--ink-mute); margin-top:2px}
  .quest-reward{ font-size:12px; font-weight:900; color:#C9420B; background:#FFEDD8; padding: 4px 8px; border-radius:99px; flex:none }

  /* section header */
  .section-head{display:flex; align-items:flex-end; justify-content:space-between; margin: 6px 0 16px}
  .section-head h2{ font-size: 30px; font-weight:900; letter-spacing:-.02em; margin: 0 }
  .section-head .eyebrow{font-size:11px;letter-spacing:.2em;font-weight:800;color:var(--brand);text-transform:uppercase; margin-bottom:6px}
  .section-head .more{font-weight:800; color: var(--ink-soft); font-size: 14px; display:flex; align-items:center; gap:6px}

  /* subject grid */
  .grid{
    display:grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
  }
  .subject{
    position:relative; overflow:hidden;
    background:#fff; border-radius: 24px;
    padding: 22px 22px 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
    min-height: 268px;
    display:flex; flex-direction:column; justify-content:space-between;
    transition: transform .18s, box-shadow .18s;
    cursor:pointer;
  }
  .subject:hover{ transform: translateY(-3px); box-shadow: var(--shadow-lg) }
  .subject.locked{ background: var(--card-soft); cursor: default; }
  .subject.locked:hover{ transform: none; box-shadow: var(--shadow) }

  .subj-top{display:flex; align-items:flex-start; justify-content:space-between}
  .subj-ic{
    width: 56px; height:56px; border-radius:18px; display:grid; place-items:center;
    box-shadow: inset 0 -2px 0 rgba(0,0,0,.06);
  }
  .subj-ic svg{ width: 28px; height:28px }
  .subj-stars{display:flex; gap:2px}
  .subj-stars .s{width:14px;height:14px;color:#E8B43A}
  .subj-stars .s.off{color:#E5EAE7}
  .soon-pill{
    background:#fff; border:1px solid var(--line);
    color: var(--ink-mute); font-size:10px; font-weight:900;
    letter-spacing:.12em; padding: 5px 10px; border-radius:99px;
  }
  .subj-name{
    font-size: 22px; font-weight:900; margin: 18px 0 2px; letter-spacing:-.01em;
  }
  .subj-tag{ font-size: 13px; color: var(--ink-soft); font-weight: 700; line-height:1.35; }

  .subj-prog{ margin-top: 14px; }
  .subj-prog-row{display:flex; justify-content:space-between; font-size: 11.5px; font-weight:800; color: var(--ink-soft); margin-bottom: 7px; letter-spacing:.02em}
  .subj-bar{ height:8px; background: var(--card-soft); border-radius:99px; overflow:hidden; border:1px solid var(--line) }
  .subj-bar > div{ height:100%; border-radius:99px; }

  .subj-cta{
    display:flex; align-items:center; justify-content:space-between;
    margin-top: 14px;
  }
  .subj-cta .next{
    font-size: 12.5px; font-weight:800; color: var(--ink); display:flex; align-items:center; gap:6px;
  }
  .subj-cta .next .dot{width:6px;height:6px;border-radius:50%}
  .subj-go{
    width: 36px; height:36px; border-radius:50%;
    background: var(--ink); color:#fff; display:grid; place-items:center;
    font-size: 14px;
    transition: transform .15s;
  }
  .subject:hover .subj-go{ transform: translateX(2px) }

  /* locked-card content */
  .locked-cnt{ text-align:left }
  .locked-cnt .subj-name{ color: var(--ink-soft) }
  .locked-cnt .subj-tag{ color: var(--ink-mute) }
  .countdown{
    display:flex; gap:6px; margin-top: 14px;
  }
  .countdown .seg{
    background:#fff; border:1px solid var(--line); border-radius: 12px;
    padding: 8px 0; text-align:center; flex:1; min-width: 0;
  }
  .countdown .seg b{display:block; font-size: 18px; font-weight:900; color: var(--ink); letter-spacing:-.02em; font-family:'JetBrains Mono', monospace}
  .countdown .seg span{font-size: 9px; color: var(--ink-mute); font-weight:800; letter-spacing:.12em; text-transform:uppercase}
  .notify-btn{
    margin-top: 14px;
    background: var(--brand-tint); color: var(--brand-deep);
    font-weight:900; font-size:12.5px; padding: 9px 14px; border-radius:99px;
    display:inline-flex; align-items:center; gap:6px;
  }

  /* friends strip */
  .friends{
    margin-top: 28px;
    background: #fff; border-radius: 24px; padding: 18px 22px;
    box-shadow: var(--shadow); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between; gap: 20px;
  }
  .friends-l{display:flex; align-items:center; gap:14px}
  .friends-title{font-weight:900; font-size: 15px}
  .friends-sub{font-size:12.5px; color:var(--ink-mute); font-weight:700; margin-top:2px}
  .stack{display:flex}
  .stack .a{
    width:36px;height:36px;border-radius:50%; border:2.5px solid #fff;
    margin-left:-10px; display:grid; place-items:center; font-weight:900; font-size: 13px; color:#fff;
    box-shadow: 0 1px 0 rgba(0,0,0,.04);
  }
  .stack .a:first-child{margin-left:0}
  .friends-r{display:flex; align-items:center; gap: 10px}
  .leaderboard-btn{
    display:flex; align-items:center; gap:8px; background: var(--ink); color:#fff;
    padding: 10px 16px; border-radius: 99px; font-weight:800; font-size:13px;
  }

  /* mascot */
  .mascot{
    position: fixed; right: 28px; bottom: 28px; z-index: 20;
    display:flex; align-items:flex-end; gap: 10px;
    pointer-events: none;
  }
  .mascot-bubble{
    background:#fff; border:1px solid var(--line); border-radius: 18px 18px 4px 18px;
    padding: 10px 14px; font-weight:800; font-size: 13px; max-width: 220px;
    box-shadow: var(--shadow);
    line-height: 1.3;
  }
  .mascot-body{
    width: 76px; height: 76px; border-radius: 50%;
    background: linear-gradient(155deg,#FFE0AE,#FFB664);
    border: 3px solid #fff; box-shadow: var(--shadow-lg);
    display:grid; place-items:center; font-size: 36px;
    animation: bob 3.4s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform: translateY(0) rotate(-3deg) }
    50%{ transform: translateY(-6px) rotate(3deg) }
  }

  /* lesson modal */
  .modal-back{
    position:fixed; inset:0; background: rgba(15,42,34,.4); backdrop-filter: blur(4px);
    z-index: 50; display:grid; place-items:center;
    animation: fade .18s ease both;
  }
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{
    width: 560px; max-width: calc(100vw - 40px);
    background:#fff; border-radius: 28px; padding: 28px;
    box-shadow: 0 30px 80px rgba(0,0,0,.25);
    animation: pop .22s cubic-bezier(.2,1.2,.4,1) both;
  }
  @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .modal-head{display:flex;align-items:center;gap:14px;margin-bottom: 6px}
  .modal-ic{width:52px;height:52px;border-radius:16px;display:grid;place-items:center}
  .modal h3{margin:0; font-size: 24px; font-weight:900; letter-spacing:-.01em}
  .modal-sub{color:var(--ink-soft); font-weight:700; font-size: 14px; margin-top:2px}
  .modal-list{margin-top: 18px; display:flex; flex-direction:column; gap:8px}
  .les{
    display:flex; align-items:center; gap:12px; padding: 12px 14px;
    border: 1px solid var(--line); border-radius: 16px;
    font-weight:800; font-size: 14.5px;
    background: #fff;
  }
  .les.done{ background: var(--card-soft); color: var(--ink-mute) }
  .les.cur{ border-color: var(--brand); background: #F1FAF5 }
  .les-n{
    width:30px;height:30px;border-radius:50%; display:grid; place-items:center;
    background: var(--card-soft); border:1px solid var(--line); font-size: 12px; font-weight:900;
  }
  .les.done .les-n{ background: var(--brand); border-color: var(--brand); color:#fff }
  .les.cur .les-n{ background: var(--brand); border-color: var(--brand); color:#fff }
  .les-name{flex:1}
  .les-min{color: var(--ink-mute); font-size: 12px; font-weight:700}
  .modal-foot{display:flex; gap:10px; margin-top: 18px}
  .btn{padding: 14px 18px; border-radius: 14px; font-weight:900; font-size:14px}
  .btn.prim{background: var(--ink); color:#fff; flex:1}
  .btn.ghost{background: var(--card-soft); color: var(--ink)}

  /* tweaks overrides */
  body.dense .v2{ padding: 18px 28px 60px }
  body.dense .hero{ margin-bottom: 18px }
  body.dense .subject{ min-height: 240px; padding: 18px }
  body.dense .continue{ padding: 22px 24px; min-height: 0 }
  body.dense .continue h2{ font-size: 26px }

  body.no-mascot .mascot{ display:none }

  /* improvements callouts */
  .callouts{
    position: fixed; left: 18px; bottom: 18px; z-index: 30;
    background: rgba(15,42,34,.92); color:#fff;
    padding: 14px 16px; border-radius: 18px;
    max-width: 280px; font-size: 12.5px; line-height:1.4;
    box-shadow: 0 14px 36px rgba(0,0,0,.25);
  }
  .callouts h4{margin:0 0 8px; font-size:11px; letter-spacing:.16em; text-transform:uppercase; opacity:.7; font-weight:800}
  .callouts ul{margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:6px}
  .callouts li{display:flex; align-items:flex-start; gap:8px; font-weight:600}
  .callouts li::before{
    content:"+"; flex:none; width:18px; height:18px; border-radius:50%;
    background: #FFB75E; color:#3A1E00; display:grid; place-items:center;
    font-weight:900; font-size:12px; margin-top: 1px;
  }
  .callouts .x{ font-size:11px; opacity:.55; font-weight:800; cursor:pointer; position:absolute; top:8px; right:12px }
  .callouts{ position: fixed }

  @media (max-width: 1100px){
    .grid{ grid-template-columns: repeat(2, 1fr) }
    .hero{ grid-template-columns: 1fr }
  }

  /* ========= MOBILE (≤ 720px) ========= */
  @media (max-width: 720px) {
    body{
      background:
        radial-gradient(700px 400px at 90% -10%, #D5EFE0 0%, transparent 60%),
        var(--bg);
    }
    .v2{ padding: 14px 14px 100px; }
    /* compare pill — smaller, below status bar */
    .compare{
      top: max(8px, env(safe-area-inset-top));
      font-size: 11px;
      padding: 4px;
    }
    .compare button{ padding: 6px 10px; }

    /* topbar — compact */
    .topbar{ margin-bottom: 16px; gap: 8px; }
    .brand{ gap: 8px; flex-shrink: 1; min-width: 0; }
    .brand-mark{ width: 38px; height: 38px; border-radius: 11px; }
    .brand-mark svg{ width: 18px; height: 18px; }
    .brand-name{ font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-sub{ font-size: 9px; letter-spacing: .1em; }
    .topbar-right{ gap: 6px; flex-shrink: 0; }
    .chip{ padding: 7px 10px; font-size: 13px; }
    .chip.streak .flame{ width: 18px; height: 18px; border-radius: 6px; font-size: 10px; }
    /* hide level chip on phone — XP chip is enough */
    .chip.xp{ display: none; }
    .lang-chip{ padding: 7px 6px 7px 10px; font-size: 12px; }
    .lang-chip span:not(.caret):not(.lang-flag){ display: none; }
    .lang-chip .caret{ display: none; }
    .lang-flag{ font-size: 18px; }
    .avatar{ width: 38px; height: 38px; border-radius: 11px; font-size: 14px; }

    /* hero — stack */
    .hero{ gap: 12px; margin-bottom: 18px; }
    .continue{ padding: 20px 20px; min-height: 0; border-radius: 22px; }
    .continue h2{ font-size: 24px; margin: 6px 0 4px; }
    .continue .sub{ font-size: 13px; }
    .continue-row{ flex-direction: column; align-items: stretch; gap: 14px; margin-top: 16px; }
    .play-btn{ justify-content: center; padding: 12px 18px; font-size: 14px; }
    .continue-bar{ height: 8px; }

    /* quests */
    .quests{ padding: 16px 18px; border-radius: 22px; }
    .quests h3{ font-size: 14px; }
    .quest{ padding: 8px 0; gap: 10px; }
    .quest-check{ width: 24px; height: 24px; border-radius: 8px; border-width: 2px; }
    .quest-title{ font-size: 13.5px; }
    .quest-meta{ font-size: 11px; }
    .quest-reward{ font-size: 11px; padding: 3px 7px; }

    /* section head */
    .section-head{ margin: 4px 0 12px; }
    .section-head h2{ font-size: 22px; }
    .section-head .eyebrow{ font-size: 10px; margin-bottom: 4px; }
    .section-head .more{ font-size: 12px; }

    /* subject grid — 1 column on tiny screens, 2 col on phones */
    .grid{ grid-template-columns: 1fr 1fr; gap: 10px; }
    .subject{ padding: 14px 14px 14px; min-height: 200px; border-radius: 18px; }
    .subj-ic{ width: 42px; height: 42px; border-radius: 12px; }
    .subj-ic svg{ width: 22px; height: 22px; }
    .subj-stars .s{ width: 11px; height: 11px; }
    .subj-name{ font-size: 16px; margin: 12px 0 2px; }
    .subj-tag{ font-size: 11px; line-height: 1.3; }
    .subj-prog-row{ font-size: 10px; margin-bottom: 5px; }
    .subj-bar{ height: 6px; }
    .subj-cta .next{ font-size: 10.5px; gap: 4px; line-height: 1.25; }
    .subj-cta .next .dot{ width: 4px; height: 4px; }
    .subj-go{ width: 28px; height: 28px; font-size: 12px; flex: none; }
    .soon-pill{ font-size: 8px; padding: 4px 8px; letter-spacing: .1em; }
    .countdown{ gap: 4px; margin-top: 10px; }
    .countdown .seg{ padding: 6px 0; border-radius: 9px; }
    .countdown .seg b{ font-size: 14px; }
    .countdown .seg span{ font-size: 8px; }
    .notify-btn{ font-size: 11px; padding: 7px 11px; }

    /* friends — stack */
    .friends{ flex-direction: column; gap: 14px; padding: 14px 16px; align-items: stretch; }
    .friends-l{ gap: 10px; }
    .friends-title{ font-size: 13px; }
    .friends-sub{ font-size: 11px; }
    .stack .a{ width: 30px; height: 30px; font-size: 11px; border-width: 2px; margin-left: -8px; }
    .leaderboard-btn{ justify-content: center; padding: 12px; font-size: 13px; }

    /* mascot — smaller, no bubble */
    .mascot{ right: 12px; bottom: 12px; }
    .mascot-body{ width: 56px; height: 56px; font-size: 26px; border-width: 2px; }
    .mascot-bubble{ display: none; }

    /* callouts — hide on mobile */
    .callouts{ display: none; }
  }

  /* very small phones (iPhone SE) */
  @media (max-width: 380px) {
    .grid{ grid-template-columns: 1fr; }
    .subject{ min-height: 0; }
    .brand-sub{ display: none; }
  }

  /* ========= MOBILE — LESSON RUNNER ========= */
  @media (max-width: 720px) {
    .lesson-top{
      padding: max(14px, env(safe-area-inset-top)) 16px 12px;
      gap: 10px;
    }
    .lt-close{ width: 36px; height: 36px; border-radius: 10px; font-size: 16px; }
    .lt-bar{ height: 12px; }
    .heart{ font-size: 18px; }

    .lesson-stage{
      padding: 16px 16px calc(150px + env(safe-area-inset-bottom));
    }
    .lesson-title-row{ margin-bottom: 12px; }
    .lt-eyebrow{ font-size: 11px; letter-spacing: .1em; max-width: 60%; line-height: 1.2; }
    .lt-counter{ font-size: 11px; padding: 4px 8px; }

    /* big prompt — already uses clamp, but ensure breathing room */
    .big-prompt{ padding: 12px 0 20px; }
    .text-prompt{ font-size: 19px; padding: 8px 0 18px; }

    .story{ padding: 16px 18px; gap: 12px; border-radius: 18px; margin-bottom: 16px; }
    .story-ic{ font-size: 24px; }
    .story-text{ font-size: 15px; line-height: 1.45; }

    /* options — keep 2 col but compact */
    .opts.grid-2{ gap: 8px; }
    .opt{ padding: 14px 14px; font-size: 17px; gap: 10px; border-radius: 14px; }
    .opt-key{ width: 26px; height: 26px; font-size: 11px; border-radius: 8px; }

    /* type input */
    .type-input{ font-size: 36px; padding: 16px 12px; border-radius: 16px; }

    /* tap grid — 4 → 3 cols on phone */
    .tap-grid{ grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .tap-w{ font-size: 20px; padding: 14px 0; border-radius: 12px; }

    /* match — single column with groups underneath */
    .match-wrap{ grid-template-columns: 1fr; gap: 12px; }
    .match-items{ gap: 6px; }
    .match-item{ padding: 12px 14px; font-size: 15px; border-radius: 12px; }
    .match-item .badge{ font-size: 10px; padding: 3px 6px; }
    .match-groups{
      position: sticky; bottom: 92px; z-index: 5;
      flex-direction: row; gap: 8px;
      background: rgba(234,245,238,.95); backdrop-filter: blur(8px);
      padding: 8px; border-radius: 16px;
      margin-top: 6px;
    }
    .match-group{ flex: 1; padding: 12px; font-size: 13px; }
    .g-count{ min-width: 22px; height: 22px; font-size: 11px; }

    /* feedback bar */
    .fb-inner{ padding: 0 16px; gap: 12px; }
    .fb-ic{ width: 40px; height: 40px; font-size: 18px; }
    .fb-title{ font-size: 15px; }
    .fb-sub{ font-size: 12px; }
    .fb-btn{ padding: 12px 16px; font-size: 14px; border-radius: 12px; }
    .feedback{
      padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
    }

    /* complete screen */
    .complete-card{ padding: 30px 24px 24px; max-width: none; }
    .celebrate{ margin-top: -60px; }
    .celebrate-emoji{ width: 76px; height: 76px; font-size: 36px; border-width: 3px; }
    .big-star{ font-size: 32px; }
    .comp-banner{ font-size: 26px; }
    .comp-stats{ margin: 18px 0; }
    .cs{ padding: 12px 4px; border-radius: 14px; }
    .cs-v{ font-size: 18px; }
    .cs-l{ font-size: 9px; }
    .btn.prim.big{ padding: 16px; font-size: 15px; }

    /* toast */
    .toast{
      top: calc(60px + env(safe-area-inset-top));
      font-size: 13px; padding: 10px 14px;
    }

    /* hide ORIGINAL view scaling chaos on mobile — show a notice instead via the toggle being smaller; the orig view will simply scroll */
    .orig{ padding: 16px 12px 60px; }
    .orig-shell{ padding: 16px 16px 24px; min-height: 0; border-radius: 20px; }
    .orig h1{ font-size: 32px; margin: 24px 0 16px; }
    .orig-top{ flex-wrap: wrap; gap: 10px; }
    .orig-grid{ gap: 10px; }
    .orig-card{ padding: 14px; min-height: 140px; border-radius: 16px; }
    .orig-card h3{ font-size: 16px; }
    .orig-card p{ font-size: 11px; }
    .orig-card .ico{ width: 40px; height: 40px; border-radius: 11px; font-size: 18px; }
    .orig-lang{ font-size: 11px; }
    .orig-lang span{ padding: 6px 8px; }
    .orig-pill{ font-size: 11px; padding: 7px 11px; }
  }

  /* ========== LESSON RUNNER ========== */
  .lesson-shell{
    position:fixed; inset:0; z-index:100;
    background:
      radial-gradient(900px 500px at 80% -10%, #D8EFE0, transparent 60%),
      radial-gradient(700px 500px at -10% 100%, #DAEFEA, transparent 60%),
      #EAF5EE;
    display:flex; flex-direction:column;
    animation: lessonIn .22s ease both;
  }
  @keyframes lessonIn{from{opacity:0; transform:scale(.98)}to{opacity:1; transform:scale(1)}}

  .lesson-top{
    display:flex; align-items:center; gap: 16px;
    padding: 20px 28px;
    max-width: 920px; width:100%; margin: 0 auto;
  }
  .lt-close{
    width:40px; height:40px; border-radius: 12px;
    background:#fff; border:1px solid var(--line);
    font-size:18px; color: var(--ink-soft); font-weight:900;
    flex:none;
    box-shadow: 0 2px 0 rgba(0,0,0,.03);
  }
  .lt-close:hover{ color: var(--ink) }
  .lt-bar{
    flex:1; height: 14px; border-radius:99px; background: #D8E8DD;
    overflow:hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,.05);
  }
  .lt-bar-fill{
    height:100%; background: linear-gradient(90deg, #18B187, var(--brand));
    border-radius:99px; transition: width .4s cubic-bezier(.2,.8,.2,1);
    box-shadow: inset 0 -2px 0 rgba(0,0,0,.08), inset 0 2px 0 rgba(255,255,255,.3);
  }
  .lt-hearts{display:flex; gap:4px; flex:none}
  .heart{font-size: 22px; line-height:1; transition: all .2s}
  .heart.on{ color:#E14B73; text-shadow: 0 1px 0 rgba(0,0,0,.05) }
  .heart.off{ color:#D8E0DA }

  .lesson-stage{
    flex:1; max-width: 720px; width:100%; margin: 0 auto;
    padding: 24px 28px 140px;
    display:flex; flex-direction:column;
    overflow-y:auto; overflow-x:hidden;
  }
  .lesson-title-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom: 18px;
  }
  .lt-eyebrow{font-size: 13px; letter-spacing:.14em; text-transform:uppercase; font-weight:900; color: var(--brand-deep)}
  .lt-counter{font-size: 12px; font-weight:900; color: var(--ink-mute); letter-spacing:.04em;
    background:#fff; padding:5px 10px; border-radius:99px; border:1px solid var(--line)}

  .qbody{
    animation: qIn .22s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes qIn{from{opacity:0; transform:translateY(8px)}to{opacity:1;transform:none}}

  .big-prompt{
    font-size: clamp(48px, 9vw, 96px); font-weight: 900;
    letter-spacing:-.04em; text-align:center;
    color: var(--ink); padding: 28px 0 36px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .text-prompt{
    font-size: 24px; font-weight:800; color: var(--ink);
    text-align:center; padding: 12px 0 24px; line-height:1.25;
  }
  .story{
    background:#fff; border:1px solid var(--line); border-radius: 22px;
    padding: 22px 24px; display:flex; gap: 16px; align-items:flex-start;
    box-shadow: var(--shadow); margin-bottom: 22px;
  }
  .story-ic{font-size: 32px; line-height:1; flex:none}
  .story-text{font-size: 18px; font-weight:700; color: var(--ink); line-height:1.45}

  .opts.stack{ display:flex; flex-direction:column; gap: 10px }
  .opts.grid-2{ display:grid; grid-template-columns: repeat(2, 1fr); gap: 12px }
  .opt{
    background:#fff; border: 2px solid var(--line); border-bottom: 4px solid #D8E0DA;
    border-radius: 16px;
    padding: 18px 18px;
    display:flex; align-items:center; gap: 14px;
    font-size: 20px; font-weight:800; color: var(--ink);
    text-align:left;
    transition: transform .1s, border-color .15s, background .15s;
  }
  .opt:hover{ border-color: var(--brand-tint); transform: translateY(-1px) }
  .opt:active{ transform: translateY(1px); border-bottom-width: 2px }
  .opt-key{
    width: 32px; height:32px; border-radius:10px;
    background: var(--card-soft); display:grid; place-items:center;
    font-size: 13px; font-weight:900; color: var(--ink-soft);
    border:1px solid var(--line); flex:none;
  }
  .opt-text{flex:1}
  .opt.sel{ border-color: var(--brand); background: #ECF8F2; border-bottom-color: var(--brand) }
  .opt.sel .opt-key{ background: var(--brand); color:#fff; border-color: var(--brand) }
  .opt.right{ border-color: var(--brand); background: #DCF3E5; border-bottom-color: var(--brand-deep); color: var(--brand-deep) }
  .opt.right .opt-key{ background: var(--brand); color:#fff; border-color: var(--brand) }
  .opt.wrong{ border-color:#E14B73; background:#FFE9EE; border-bottom-color:#B5375A; color:#B5375A }
  .opt.wrong .opt-key{ background:#E14B73; color:#fff; border-color:#E14B73 }
  .opt.dim{ opacity:.45 }

  .type-wrap{
    display:flex; align-items:center; gap: 10px;
    width: 100%; max-width: 360px; margin: 0 auto;
    box-sizing: border-box;
  }
  .type-input{
    flex:1; min-width: 0; font-family: inherit;
    font-size: 44px; font-weight: 900; letter-spacing:-.02em;
    text-align:center;
    background:#fff; border: 2px solid var(--line); border-bottom: 4px solid #D8E0DA;
    border-radius: 18px; padding: 18px 16px;
    color: var(--ink);
    outline:none;
    font-variant-numeric: tabular-nums;
  }
  .type-input:focus{ border-color: var(--brand); border-bottom-color: var(--brand) }
  .type-input.right{ border-color: var(--brand); background: #DCF3E5; color: var(--brand-deep) }
  .type-input.wrong{ border-color:#E14B73; background:#FFE9EE; color:#B5375A }
  .type-input::placeholder{ font-size: 15px; font-weight: 700; letter-spacing: 0; opacity: .55 }
  .units{font-size:24px; font-weight:900; color: var(--ink-soft)}

  .tap-grid{
    display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    max-width: 540px; margin: 0 auto;
  }
  .tap-w{
    background:#fff; border:2px solid var(--line); border-bottom:4px solid #D8E0DA;
    border-radius: 14px; padding: 18px 0;
    font-size: 24px; font-weight:900; color: var(--ink);
    text-align:center;
    transition: transform .1s, border-color .15s;
  }
  .tap-w:hover{ border-color: var(--brand-tint) }
  .tap-w.sel{ background: #ECF8F2; border-color: var(--brand); border-bottom-color: var(--brand) }
  .tap-w.right{ background: #DCF3E5; border-color: var(--brand); color: var(--brand-deep) }
  .tap-w.wrong{ background:#FFE9EE; border-color:#E14B73; color:#B5375A }
  .tap-w.missed{ background:#FFF6E0; border-color:#E8B43A; color:#7A5A0E }
  .tap-w.dim{ opacity:.45 }

  /* match */
  .match-wrap{ display:grid; grid-template-columns: 1.4fr 1fr; gap: 16px; max-width: 640px; margin: 0 auto }
  .match-items{ display:flex; flex-direction:column; gap: 8px }
  .match-item{
    background:#fff; border:2px solid var(--line); border-bottom:4px solid #D8E0DA;
    border-radius: 14px; padding: 14px 16px;
    display:flex; align-items:center; justify-content:space-between; gap: 10px;
    font-size: 18px; font-weight:800; color: var(--ink); text-align:left;
  }
  .match-item.active{ border-color: var(--brand); background:#ECF8F2 }
  .match-item.placed{ background:#F5FBF7; color: var(--ink-soft) }
  .match-item.right{ background:#DCF3E5; border-color: var(--brand); color: var(--brand-deep) }
  .match-item.wrong{ background:#FFE9EE; border-color:#E14B73; color:#B5375A }
  .match-item .badge{
    font-size:11px; font-weight:900; padding: 4px 8px; border-radius:99px;
    background: var(--ink); color:#fff; letter-spacing:.04em;
  }
  .match-groups{ display:flex; flex-direction:column; gap: 8px }
  .match-group{
    background:#fff; border:2px dashed var(--line);
    border-radius: 14px; padding: 16px;
    display:flex; align-items:center; justify-content:space-between;
    font-size: 16px; font-weight:900; color: var(--ink);
  }
  .match-group.ready{ border-color: var(--brand); background:#ECF8F2; border-style:solid }
  .g-count{
    background: var(--ink); color:#fff; min-width: 28px; height:28px;
    border-radius:99px; display:grid; place-items:center; font-size:12px;
  }

  /* feedback bar */
  .feedback{
    position:fixed; left:0; right:0; bottom:0; z-index: 102;
    background: transparent; padding: 16px 0;
    border-top: 1px solid var(--line);
    background: #fff;
    box-shadow: 0 -8px 28px rgba(15,80,60,.06);
    transition: background .2s;
  }
  .feedback.right{ background: #DCF3E5; border-top-color: #98D8B5 }
  .feedback.wrong{ background: #FFE9EE; border-top-color: #F2B7C6 }
  .fb-inner{
    max-width: 920px; margin: 0 auto; padding: 0 28px;
    display:flex; align-items:center; gap: 16px;
  }
  .fb-ic{
    width: 50px; height:50px; border-radius: 50%;
    display:grid; place-items:center; font-size: 22px; font-weight:900; color:#fff;
    flex:none; box-shadow: 0 4px 0 rgba(0,0,0,.08);
  }
  .fb-ic.ok{ background: var(--brand) }
  .fb-ic.no{ background:#E14B73 }
  .fb-msg{ flex:1 }
  .fb-title{ font-size: 18px; font-weight:900; color: var(--ink) }
  .feedback.right .fb-title{ color: var(--brand-deep) }
  .feedback.wrong .fb-title{ color:#B5375A }
  .fb-sub{ font-size: 13px; font-weight:700; color: var(--ink-soft); margin-top: 2px }
  .fb-btn{
    background: var(--ink); color:#fff; font-weight:900; font-size: 15px;
    padding: 14px 22px; border-radius: 14px;
    border-bottom: 4px solid rgba(0,0,0,.25);
    transition: transform .1s;
  }
  .fb-btn:active{ transform: translateY(2px); border-bottom-width:2px }
  .fb-btn.ghost{ background:#fff; color: var(--ink-soft); border:2px solid var(--line); border-bottom:4px solid #D8E0DA }
  .fb-btn.primary{ background: var(--brand); border-bottom-color: var(--brand-deep) }
  .feedback.right .fb-btn{ background: var(--brand); border-bottom-color: var(--brand-deep) }
  .feedback.wrong .fb-btn{ background:#E14B73; border-bottom-color:#B5375A }
  .fb-btn.disabled, .fb-btn:disabled{ opacity:.4; cursor:not-allowed }

  /* quit modal */
  .qmodal-back{ position:fixed; inset:0; background:rgba(15,42,34,.45); z-index:103; display:grid; place-items:center }
  .qmodal{ background:#fff; border-radius:24px; padding:24px; max-width:380px; width:calc(100% - 40px); text-align:center }
  .qmodal h3{ margin: 8px 0 18px; font-size:18px; font-weight:800 }
  .qmodal-foot{ display:flex; gap: 10px }
  .qmodal-foot .btn{ flex:1 }

  /* complete screen */
  .lesson-shell.complete{
    background:
      radial-gradient(900px 500px at 50% -10%, #FFE0AE, transparent 60%),
      radial-gradient(700px 500px at -10% 100%, #DAEFEA, transparent 60%),
      #FFF8EC;
  }
  .complete-card{
    margin: auto; background:#fff; border-radius: 28px; padding: 36px 36px 30px;
    max-width: 460px; width: calc(100% - 40px); text-align:center;
    box-shadow: var(--shadow-lg);
    border:1px solid var(--line);
    position:relative; z-index:2;
    animation: pop .35s cubic-bezier(.2,1.4,.4,1) both;
  }
  .celebrate{ margin-top:-80px; margin-bottom: 4px }
  .celebrate-emoji{
    width: 96px; height:96px; border-radius: 50%;
    background: linear-gradient(155deg,#FFD787,#FFA94D);
    border: 4px solid #fff; box-shadow: 0 12px 30px rgba(255,140,0,.3);
    margin: 0 auto; display:grid; place-items:center; font-size: 44px;
    animation: pop .5s cubic-bezier(.2,1.6,.4,1) both;
  }
  .comp-stars{ display:flex; gap: 6px; justify-content:center; margin: 14px 0 4px }
  .big-star{ font-size: 40px; line-height:1; transition: all .3s }
  .big-star.on{ color:#FFB547; text-shadow: 0 2px 0 rgba(220,140,0,.2); animation: starPop .5s cubic-bezier(.2,1.6,.4,1) both }
  .big-star.on:nth-child(2){ animation-delay:.12s }
  .big-star.on:nth-child(3){ animation-delay:.24s }
  .big-star.off{ color:#E5EAE7 }
  @keyframes starPop{from{transform:scale(0) rotate(-180deg); opacity:0}to{transform:scale(1) rotate(0); opacity:1}}
  .comp-banner{ font-size: 32px; font-weight:900; letter-spacing:-.02em; margin: 6px 0 0; color: var(--brand-deep) }
  .comp-sub{ font-size: 13px; color: var(--ink-soft); font-weight:700; margin-top: 4px }
  .comp-stats{
    display:grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    margin: 24px 0;
  }
  .cs{ background: var(--card-soft); border-radius: 16px; padding: 14px 6px; border:1px solid var(--line) }
  .cs-v{ font-size: 22px; font-weight:900; color: var(--brand-deep); font-variant-numeric: tabular-nums }
  .cs-l{ font-size: 11px; font-weight:800; color: var(--ink-mute); letter-spacing:.08em; text-transform:uppercase; margin-top: 2px }
  .btn.prim.big{ width: 100%; padding: 18px; font-size: 16px; border-radius: 16px; border-bottom: 4px solid #000; background: var(--ink) }

  /* confetti */
  .confetti-host{ position:absolute; inset:0; overflow:hidden; pointer-events:none }
  .confetti{
    position:absolute; top:-20px; width: 10px; height: 14px;
    border-radius: 2px;
    animation: confettiFall 2.4s linear forwards;
  }
  @keyframes confettiFall{
    0%{ transform: translateY(0) rotate(0deg); opacity:1 }
    100%{ transform: translateY(110vh) rotate(720deg); opacity:.6 }
  }

  /* toast — XP gained */
  .toast{
    position:fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color:#fff; padding: 12px 18px; border-radius:99px;
    font-weight:900; font-size: 14px; z-index: 200;
    box-shadow: 0 12px 30px rgba(0,0,0,.2);
    animation: toastIn .25s ease both, toastOut .3s ease 2.4s forwards;
    display:flex; align-items:center; gap: 10px;
  }
  @keyframes toastIn{from{opacity:0; transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
  @keyframes toastOut{to{opacity:0; transform:translate(-50%,-10px)}}
  .toast .ic{
    width: 24px; height:24px; border-radius: 8px;
    background: linear-gradient(180deg,#FFB347,#FF6B2B); display:grid; place-items:center;
  }

  /* ── Onboarding ── */
  .onboarding{
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:40px 24px; gap:20px; text-align:center;
  }
  .ob-logo{
    width:72px; height:72px; border-radius:22px; background:var(--brand);
    display:grid; place-items:center;
  }
  .ob-logo svg{ width:36px; height:36px; color:#fff }
  .ob-title{ font-size:38px; font-weight:900; letter-spacing:-.02em; margin:0 }
  .ob-sub{ font-size:16px; font-weight:600; color:var(--ink-soft); margin:0; max-width:340px; line-height:1.5 }
  .ob-form{ display:flex; flex-direction:column; gap:12px; width:100%; max-width:360px }
  .ob-input{
    background:var(--card); border:2px solid var(--line); border-radius:16px;
    padding:18px 20px; font-size:20px; font-weight:700; font-family:inherit;
    color:var(--ink); width:100%; text-align:center; outline:none; transition:border-color .15s;
  }
  .ob-input:focus{ border-color:var(--brand) }
  .ob-input::placeholder{ font-size:16px; font-weight:600; opacity:.5; letter-spacing:0 }
  .ob-langs{ display:flex; gap:8px; justify-content:center }
  .ob-lang{
    padding:10px 14px; border-radius:12px; font-size:14px; font-weight:800;
    background:var(--card); border:2px solid var(--line); color:var(--ink-soft);
    display:flex; align-items:center; gap:6px; transition:all .15s;
  }
  .ob-lang.on{ background:var(--brand-tint); border-color:var(--brand); color:var(--brand-deep) }
  .ob-start{
    background:var(--brand); color:#fff; border-radius:16px;
    padding:18px; font-size:18px; font-weight:900; transition:opacity .15s;
    box-shadow:0 8px 24px rgba(14,140,107,.35);
  }
  .ob-start:disabled{ opacity:.35; box-shadow:none; cursor:not-allowed }

  /* ── Lesson intro ── */
  .lesson-intro{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:40px 24px; text-align:center; gap:16px;
  }
  .li-subject{ font-size:12px; letter-spacing:.2em; font-weight:800; color:var(--brand); text-transform:uppercase }
  .li-title{ font-size:30px; font-weight:900; letter-spacing:-.02em; margin:0; max-width:440px; line-height:1.15 }
  .li-text{
    font-size:17px; font-weight:600; color:var(--ink-soft); max-width:400px;
    line-height:1.55; background:var(--card-soft); border-radius:20px; padding:20px 24px;
  }
  .li-meta{ display:flex; gap:12px }
  .li-pill{
    background:var(--card-soft); border-radius:99px; padding:8px 18px;
    font-size:13px; font-weight:800; color:var(--ink-mute);
  }
  .li-start{
    background:var(--brand); color:#fff; border-radius:16px; padding:18px 48px;
    font-size:18px; font-weight:900; margin-top:8px;
    box-shadow:0 8px 24px rgba(14,140,107,.35);
    transition:transform .1s;
  }
  .li-start:active{ transform:scale(.98) }

  /* ── Dark mode ── */
  body.dark{
    --bg:#0D1B2A; --bg-2:#0F2030;
    --ink:#E8F0F7; --ink-soft:#8BA4BF; --ink-mute:#4A6A7E;
    --line:rgba(232,240,247,.09);
    --card:#152030; --card-soft:#1B2C3E;
    --brand-tint:#0D3428;
    --shadow:0 1px 0 rgba(0,0,0,.3),0 10px 28px rgba(0,0,0,.5);
    --shadow-lg:0 2px 0 rgba(0,0,0,.3),0 22px 50px rgba(0,0,0,.6);
    background:
      radial-gradient(1200px 600px at 85% -10%,rgba(14,60,42,.7) 0%,transparent 60%),
      radial-gradient(900px 600px at -10% 100%,rgba(10,46,42,.7) 0%,transparent 60%),
      var(--bg);
  }
  @media(max-width:720px){
    body.dark{
      background:
        radial-gradient(700px 400px at 90% -10%,rgba(14,60,42,.5) 0%,transparent 60%),
        var(--bg);
    }
  }
  body.dark .chip{ background:var(--card) }
  body.dark .lang-chip{ background:var(--card) }
  body.dark .avatar{ background:var(--brand-deep); color:#fff }
  body.dark .modal{ background:var(--card) }
  body.dark .les{ background:var(--card) }
  body.dark .les.cur{ background:var(--card-soft) }
  body.dark .opt,
  body.dark .tap-w,
  body.dark .match-item,
  body.dark .match-group{ background:var(--card); border-color:var(--line); border-bottom-color:rgba(0,0,0,.3) }
  body.dark .type-input{ background:var(--card); color:var(--ink); border-color:var(--line); border-bottom-color:rgba(0,0,0,.3) }
  body.dark .quests{ background:var(--card) }
  body.dark .subject{ background:var(--card) }
  body.dark .friends{ background:var(--card) }
  body.dark .complete-card{ background:var(--card) }
  body.dark .qmodal{ background:var(--card) }
  body.dark .lt-close{ background:var(--card) }
  body.dark .lt-bar{ background:rgba(255,255,255,.1) }
  body.dark .lt-counter{ background:var(--card) }
  body.dark .feedback{ background:var(--card) }
  body.dark .feedback.right{ background:#0B3D22; border-top-color:#1B6640 }
  body.dark .feedback.wrong{ background:#3D1120; border-top-color:#6B2040 }
  body.dark .fb-btn.ghost{ background:var(--card-soft); border-color:var(--line) }
  body.dark .btn.ghost{ background:var(--card-soft) }
  body.dark .story{ background:var(--card-soft) }
  body.dark .lesson-shell:not(.complete){ background:var(--bg) }
  body.dark .match-item.active{ background:var(--brand-tint) }
  body.dark .match-item.placed{ background:var(--card-soft) }
  body.dark .match-group.ready{ background:var(--brand-tint) }
  body.dark .li-text{ background:var(--card-soft) }
  body.dark .ob-input{ background:var(--card) }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
(async () => {
  const opts = { presets: ['react'] };
  for (const src of ['tweaks-panel.jsx', 'lesson-runner.jsx', 'app.jsx']) {
    try {
      const res = await fetch(src);
      if (!res.ok) throw new Error('HTTP ' + res.status + ' loading ' + src);
      const jsx = await res.text();
      const { code } = Babel.transform(jsx, Object.assign({}, opts, { filename: src }));
      (0, eval)(code);
    } catch (e) {
      console.error('[loader] failed to load', src, e);
      document.getElementById('app').innerHTML =
        '<div style="padding:48px;text-align:center;font-family:sans-serif;color:#0F2A22">' +
        '<h2 style="color:#c00;margin-bottom:8px">Cannot load app</h2>' +
        '<p style="margin:0 0 12px">Open via HTTP server, not file://.<br>' +
        'Run: <code style="background:#eee;padding:2px 6px;border-radius:4px">python3 -m http.server 3000</code></p>' +
        '<pre style="font-size:12px;color:#c00;background:#fff3f3;padding:10px;border-radius:8px;text-align:left;max-width:600px;margin:0 auto">' + e + '</pre>' +
        '</div>';
      return;
    }
  }
  ReactDOM.createRoot(document.getElementById('app'))
    .render(React.createElement(window.App));
})();
</script>
</body>
</html>
